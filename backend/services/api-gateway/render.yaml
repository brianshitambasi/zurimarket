services:
  - type: web
    name: zurimarket
    runtime: python
    plan: starter
    region: oregon
    buildCommand: cd backend/services/api-gateway && pip install -r requirements.txt
    startCommand: cd backend/services/api-gateway && uvicorn app.main:app --host 0.0.0.0 --port 8080
    envVars:
      - key: AUTH_SERVICE
        value: https://zurimarket-auth.onrender.com
      - key: PRODUCT_SERVICE
        value: https://zurimarket-product.onrender.com
      - key: ORDER_SERVICE
        value: https://zurimarket-order.onrender.com
      - key: CART_SERVICE
        value: https://zurimarket-cart.onrender.com
      - key: PAYMENT_SERVICE
        value: https://zurimarket-payment.onrender.com
      - key: NOTIFICATION_SERVICE
        value: https://zurimarket-notification.onrender.com
      - key: MPESA_SERVICE
        value: https://zurimarket-mpesa.onrender.com
      - key: ADMIN_SERVICE
        value: https://zurimarket-admin.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.11

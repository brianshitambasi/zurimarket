services:
  - type: web
    name: zurimarket-mpesa
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt requests python-dotenv
    startCommand: uvicorn app.mpesa_real:app --host 0.0.0.0 --port 8007
    envVars:
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_PASSKEY
        value: bfb279f9aa9bdbcf158e97dd71a467cd2e0c893059b10f78e6b72ada1ed2c919
      - key: MPESA_SHORTCODE
        value: 174379
      - key: MPESA_ENVIRONMENT
        value: sandbox
      - key: MPESA_CALLBACK_URL
        value: https://zurimarket-mpesa.onrender.com/api/mpesa/callback
      - key: MPESA_TIMEOUT_URL
        value: https://zurimarket-mpesa.onrender.com/api/mpesa/timeout

services:
  - type: web
    name: zurimarket-order
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main_pg:app --host 0.0.0.0 --port 8002
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zurimarket-postgres
          property: connectionString

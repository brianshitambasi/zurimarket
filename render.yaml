services:
  # Auth Service
  - type: web
    name: zurimarket-auth
    runtime: python
    repo: https://github.com/YOUR_USERNAME/zurimarket
    plan: starter
    region: oregon
    buildCommand: |
      cd backend/services/auth-service
      pip install -r requirements.txt
    startCommand: |
      cd backend/services/auth-service
      uvicorn app.main_pg_fixed:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zurimarket-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256

  # Product Service
  - type: web
    name: zurimarket-product
    runtime: python
    plan: starter
    region: oregon
    buildCommand: |
      cd backend/services/product-service
      pip install -r requirements.txt
    startCommand: |
      cd backend/services/product-service
      uvicorn app.main_mongo:app --host 0.0.0.0 --port 8001
    envVars:
      - key: MONGODB_URL
        value: mongodb://zuri:zuripass@mongodb:27017

  # Order Service
  - type: web
    name: zurimarket-order
    runtime: python
    plan: starter
    region: oregon
    buildCommand: |
      cd backend/services/order-service
      pip install -r requirements.txt
    startCommand: |
      cd backend/services/order-service
      uvicorn app.main_pg:app --host 0.0.0.0 --port 8002
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zurimarket-postgres
          property: connectionString

  # Cart Service
  - type: web
    name: zurimarket-cart
    runtime: python
    plan: starter
    region: oregon
    buildCommand: |
      cd backend/services/cart-service
      pip install -r requirements.txt
    startCommand: |
      cd backend/services/cart-service
      uvicorn app.main_mongo:app --host 0.0.0.0 --port 8003
    envVars:
      - key: MONGODB_URL
        value: mongodb://zuri:zuripass@mongodb:27017

  # Payment Service
  - type: web
    name: zurimarket-payment
    runtime: python
    plan: starter
    region: oregon
    buildCommand: |
      cd backend/services/payment-service
      pip install -r requirements.txt
    startCommand: |
      cd backend/services/payment-service
      uvicorn app.main_pg:app --host 0.0.0.0 --port 8004
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zurimarket-postgres
          property: connectionString

  # Notification Service
  - type: web
    name: zurimarket-notification
    runtime: python
    plan: starter
    region: oregon
    buildCommand: |
      cd backend/services/notification-service
      pip install -r requirements.txt
    startCommand: |
      cd backend/services/notification-service
      uvicorn app.main_mongo:app --host 0.0.0.0 --port 8005
    envVars:
      - key: MONGODB_URL
        value: mongodb://zuri:zuripass@mongodb:27017

  # M-PESA Service
  - type: web
    name: zurimarket-mpesa
    runtime: python
    plan: starter
    region: oregon
    buildCommand: |
      cd backend/services/payment-service
      pip install -r requirements.txt requests python-dotenv
    startCommand: |
      cd backend/services/payment-service
      uvicorn app.mpesa_real:app --host 0.0.0.0 --port 8007
    envVars:
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_PASSKEY
        value: bfb279f9aa9bdbcf158e97dd71a467cd2e0c893059b10f78e6b72ada1ed2c919
      - key: MPESA_SHORTCODE
        value: 174379
      - key: MPESA_ENVIRONMENT
        value: sandbox
      - key: MPESA_CALLBACK_URL
        value: https://zurimarket-mpesa.onrender.com/api/mpesa/callback
      - key: MPESA_TIMEOUT_URL
        value: https://zurimarket-mpesa.onrender.com/api/mpesa/timeout

  # API Gateway
  - type: web
    name: zurimarket-gateway
    runtime: python
    plan: starter
    region: oregon
    buildCommand: |
      cd backend/services/api-gateway
      pip install -r requirements.txt
    startCommand: |
      cd backend/services/api-gateway
      uvicorn app.main:app --host 0.0.0.0 --port 8080
    envVars:
      - key: AUTH_SERVICE
        value: https://zurimarket-auth.onrender.com
      - key: PRODUCT_SERVICE
        value: https://zurimarket-product.onrender.com
      - key: ORDER_SERVICE
        value: https://zurimarket-order.onrender.com
      - key: CART_SERVICE
        value: https://zurimarket-cart.onrender.com
      - key: PAYMENT_SERVICE
        value: https://zurimarket-payment.onrender.com
      - key: NOTIFICATION_SERVICE
        value: https://zurimarket-notification.onrender.com
      - key: MPESA_SERVICE
        value: https://zurimarket-mpesa.onrender.com

databases:
  - name: zurimarket-postgres
    plan: starter
    region: oregon
    ipAllowList: []
    postgresMajorVersion: 15
